  <title>ECHELON / orbital megacity node</title>
  <style>
    :root {
      --bg: #02050b;
      --bg-mid: #07111f;
      --bg-high: #0f213d;
      --red-0: #ff0606;
      --red-1: #ff1313;
      --red-2: #ff2424;
      --red-3: #ff3a32;
      --red-4: #ff6543;
      --red-5: #ffab7e;
      --cyan-0: #8ce6ff;
      --cyan-1: #46ccff;
      --cyan-2: rgba(70, 204, 255, 0.62);
      --blue-0: #4a7cff;
      --violet-0: #9a7cff;
      --amber-0: #ffd39f;
      --amber-1: rgba(255, 211, 159, 0.7);
      --white-0: rgba(255,255,255,0.96);
      --white-1: rgba(255,255,255,0.74);
      --white-2: rgba(255,255,255,0.42);
      --glow-red-a: rgba(255, 12, 12, 0.78);
      --glow-red-b: rgba(255, 34, 22, 0.34);
      --glow-red-c: rgba(255, 110, 80, 0.20);
      --glow-blue-a: rgba(70, 204, 255, 0.32);
      --shadow: rgba(0, 0, 0, 0.82);
      --scene-width: 1920;
      --scene-height: 1080;
      --scene-scale: 1;
      --scene-detail-contrast: 1;
      --scene-detail-sat: 1;
      --scene-detail-sharp: 1;
      --scene-detail-boost: 1;
      --scene-glow-boost: 1;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 14%, rgba(58, 92, 148, 0.28) 0%, transparent 38%),
        radial-gradient(circle at 52% 64%, rgba(255, 24, 24, 0.14) 0%, transparent 46%),
        linear-gradient(180deg, #050d1b 0%, #020912 64%, #000 100%);
      font-family: "Rajdhani", "Orbitron", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
    }

    body {
      display: grid;
      place-items: center;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      background: transparent;
      isolation: isolate;
      overflow: hidden;
    }

    .stage::before,
    .stage::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .stage::before {
      z-index: 0;
      background:
        radial-gradient(ellipse at 52% 76%, rgba(255, 20, 20, 0.16) 0%, rgba(255, 20, 20, 0.04) 32%, transparent 62%),
        radial-gradient(ellipse at 46% 10%, rgba(76, 162, 255, 0.26) 0%, rgba(76, 162, 255, 0.08) 30%, transparent 56%),
        linear-gradient(180deg, rgba(3, 8, 18, 0.0) 0%, rgba(2, 6, 14, 0.44) 62%, rgba(0, 0, 0, 0.86) 100%);
    }

    .stage::after {
      z-index: 1;
      background: radial-gradient(ellipse at center, transparent 42%, rgba(0, 0, 0, 0.66) 100%);
      mix-blend-mode: multiply;
    }

    .echelon-node {
      position: absolute;
      left: 50%;
      top: 50%;
      width: calc(var(--scene-width) * 1px);
      height: calc(var(--scene-height) * 1px);
      isolation: isolate;
      overflow: visible;
      transform: translate(-50%, -50%) scale(var(--scene-scale));
      transform-origin: center center;
      contain: layout style;
      backface-visibility: hidden;
      will-change: transform, filter;
      z-index: 4;
    }

    .echelon-node::before,
    .echelon-node::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .echelon-node::before {
      z-index: 2;
      background:
        radial-gradient(ellipse at 50% 52%, rgba(255, 10, 10, 0.16) 0%, transparent 56%),
        radial-gradient(ellipse at 50% 18%, rgba(80, 198, 255, 0.16) 0%, transparent 50%);
      mix-blend-mode: color-dodge;
      opacity: 0.74;
      animation: atmosphereDrift 18s ease-in-out infinite alternate;
      display: none;
    }

    .echelon-node::after {
      z-index: 60;
      background:
        repeating-linear-gradient(180deg, rgba(255,255,255,0.026) 0 1px, transparent 1px 3px),
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.0) 24%, rgba(0,0,0,0.14) 100%);
      mix-blend-mode: soft-light;
      opacity: calc(0.4 * var(--scene-detail-boost));
    }

    .title-block {
      position: absolute;
      left: 8.4%;
      top: 8.4%;
      z-index: 80;
      pointer-events: none;
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    .title-block .name {
      margin: 0;
      font-size: clamp(1rem, 2vw, 1.68rem);
      font-weight: 900;
      line-height: 1;
      color: var(--white-0);
      text-shadow:
        0 0 12px rgba(255,255,255,0.12),
        0 0 18px rgba(255, 48, 82, 0.20),
        2px 2px 0 rgba(0,0,0,0.5);
    }

    .title-block .meta {
      margin: 0.58rem 0 0;
      font-size: clamp(0.54rem, 0.88vw, 0.74rem);
      font-weight: 600;
      color: var(--white-2);
      white-space: nowrap;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.7);
    }

    .city-core {
      position: absolute;
      inset: 2.4% 3.5% 2.8% 3.5%;
      filter:
        saturate(var(--scene-detail-sat))
        contrast(var(--scene-detail-contrast));
      isolation: isolate;
      animation: cityDrift 22s ease-in-out infinite alternate;
      will-change: transform, filter;
    }

    .city-core::before,
    .city-core::after {
      content: "";
      position: absolute;
      pointer-events: none;
      z-index: 56;
    }

    .city-core::before {
      inset: -4%;
      background:
        radial-gradient(ellipse at 50% 54%, rgba(255, 8, 8, 0.28) 0%, rgba(255, 8, 8, 0.10) 34%, transparent 66%),
        radial-gradient(ellipse at 46% 24%, rgba(255, 90, 54, 0.16) 0%, transparent 42%);
      mix-blend-mode: color-dodge;
      opacity: 0.62;
      animation: none;
      display: none;
    }

    .city-core::after {
      inset: 0;
      background:
        linear-gradient(90deg, rgba(255, 14, 14, 0.0), rgba(255, 14, 14, 0.12) 24%, rgba(70, 204, 255, 0.08) 52%, rgba(255, 14, 14, 0.14) 76%, rgba(255, 14, 14, 0.0)),
        repeating-linear-gradient(180deg, rgba(255,255,255,0.02) 0 1px, transparent 1px 4px);
      mix-blend-mode: soft-light;
      opacity: calc(0.34 * var(--scene-detail-boost));
      display: none;
    }

      position: absolute;

      border: 1px solid rgba(182, 210, 246, 0.26);

        linear-gradient(180deg, rgba(224, 240, 255, 0.2), rgba(34, 50, 78, 0.94) 35%, rgba(8, 14, 26, 1) 100%),

      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.05),
        inset 0 14px 12px rgba(220, 236, 255, 0.10),
        inset 0 -14px 18px rgba(0,0,0,0.56),
        0 0 16px rgba(0,0,0,0.42),
        0 0 14px rgba(70, 204, 255, 0.12);
      opacity: 1;
      overflow: hidden;
    }

    .train-stop-ramp::before,
    .train-stop-ramp::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .train-stop-ramp::before {

      height: 43%;

  <script>
    const __AXS_SCENE_FLAGS__ = (() => {
      const params = new URLSearchParams(window.location.search);
      const lite = params.get("mode") === "lite" || params.get("lite") === "1";
      const embed = params.get("embed") === "1";
      const fitMode = params.get("fit");
      const coverFit = fitMode === "cover";
      const frameFit = fitMode === "frame" || coverFit;
      let zoom = Number.parseFloat(params.get("zoom") || "1");
      if (!Number.isFinite(zoom)) {
        zoom = 1;
      }
      zoom = Math.min(2, Math.max(0.6, zoom));

      if (embed) {
        document.documentElement.classList.add("embed-mode");
        document.body.classList.add("embed-mode");
      }

      if (lite) {
        document.documentElement.classList.add("axs-lite");
        document.body.classList.add("axs-lite");
      }

      return { lite, embed, frameFit, coverFit, zoom };
    })();

    (() => {
      // Build handoff: future React host should keep scale control in a client-only imperative hook.
      const stageEl = document.querySelector(".stage");
      const nodeEl = document.querySelector(".echelon-node");

      if (!stageEl || !nodeEl) {
        return;
      }

      const REFERENCE_WIDTH = 1920;
      const REFERENCE_HEIGHT = 1080;
      const FRAME_FIT_SCALE = __AXS_SCENE_FLAGS__.frameFit ? 1 : 0.88;
      const MIN_SCALE = __AXS_SCENE_FLAGS__.frameFit ? 0.34 : 0.42;
      const MAX_SCALE = __AXS_SCENE_FLAGS__.frameFit ? 1.45 : 1.1;
      const DETAIL_FLOOR = 0.64;
      let lastState = null;

      const clamp = (value, min, max) => Math.min(max, Math.max(min, value));

      const computeAdaptiveState = (viewportWidth, viewportHeight) => {
        const baseScale = __AXS_SCENE_FLAGS__.coverFit
          ? Math.max(viewportWidth / REFERENCE_WIDTH, viewportHeight / REFERENCE_HEIGHT)
          : Math.min(viewportWidth / REFERENCE_WIDTH, viewportHeight / REFERENCE_HEIGHT);
        const rawScale = baseScale * FRAME_FIT_SCALE * __AXS_SCENE_FLAGS__.zoom;
        const scale = clamp(rawScale, MIN_SCALE, MAX_SCALE);
        const detailFactor = clamp((DETAIL_FLOOR - scale) / DETAIL_FLOOR, 0, 1);

        return {
          scale,
          detailBoost: 1 + detailFactor * 0.55,
          detailContrast: 1 + detailFactor * 0.30,
          detailSaturation: 1 + detailFactor * 0.34,
          detailSharp: 1 + detailFactor * 0.84,
          glowBoost: 1 + detailFactor * 0.52
        };
      };

      const applyAdaptiveState = (state) => {
        nodeEl.style.setProperty("--scene-scale", state.scale.toFixed(4));
        nodeEl.style.setProperty("--scene-detail-boost", state.detailBoost.toFixed(4));
        nodeEl.style.setProperty("--scene-detail-contrast", state.detailContrast.toFixed(4));
        nodeEl.style.setProperty("--scene-detail-sat", state.detailSaturation.toFixed(4));
        nodeEl.style.setProperty("--scene-detail-sharp", state.detailSharp.toFixed(4));
        nodeEl.style.setProperty("--scene-glow-boost", state.glowBoost.toFixed(4));
        nodeEl.dataset.scale = state.scale.toFixed(4);
        lastState = state;
      };

      const refresh = () => {
        const rect = stageEl.getBoundingClientRect();
        if (!rect.width || !rect.height) {
          return;
        }
        applyAdaptiveState(computeAdaptiveState(rect.width, rect.height));
      };

      const setScale = (nextScale) => {
        if (typeof nextScale !== "number" || Number.isNaN(nextScale)) {
          return;
        }
        const rect = stageEl.getBoundingClientRect();
        const forcedScale = clamp(nextScale, MIN_SCALE, MAX_SCALE);
        const state = computeAdaptiveState(rect.width, rect.height);
        state.scale = forcedScale;
        applyAdaptiveState(state);
      };

      const setViewport = (width, height) => {
        if (!width || !height) {
          return;
        }
        applyAdaptiveState(computeAdaptiveState(width, height));
      };

      let refreshFrame = 0;
      const scheduleRefresh = () => {
        if (refreshFrame) {
          return;
        }
        refreshFrame = window.requestAnimationFrame(() => {
          refreshFrame = 0;
          refresh();
        });
      };

      const onViewportResize = () => scheduleRefresh();
      const resizeObserver = new ResizeObserver(scheduleRefresh);
      resizeObserver.observe(stageEl);
      window.addEventListener("resize", onViewportResize, { passive: true });

      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", onViewportResize, { passive: true });
      }

      refresh();

      // React/TS host can use window.__AXS_ECHELON_NODE_V2__ to control render scale.
      const api = {
        id: "echelon-node-v2",
        version: "2.1.0",
        refresh,
        setScale,
        setViewport,
        getState: () => ({ ...lastState }),
        destroy: () => {
          resizeObserver.disconnect();
          if (refreshFrame) {
            window.cancelAnimationFrame(refreshFrame);
            refreshFrame = 0;
          }
          window.removeEventListener("resize", onViewportResize);
          if (window.visualViewport) {
            window.visualViewport.removeEventListener("resize", onViewportResize);
          }
          if (window.__AXS_ECHELON_NODE_V2__ === api) {
            delete window.__AXS_ECHELON_NODE_V2__;
          }
        }
      };

      window.__AXS_ECHELON_NODE_V2__ = api;
      window.dispatchEvent(new CustomEvent("axs:echelon-node-v2-ready", { detail: api }));
    })();

    (() => {
      if (__AXS_SCENE_FLAGS__.lite) {
        return;
      }

      // Build handoff: AV battle stage and patrol route should migrate into isolated client hooks, not React state.
      const battleEl = document.querySelector(".battle-engagement");
      if (!battleEl) {
        return;
      }

      const reduceMotionQuery = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)");
      const prefersReducedMotion = !!(reduceMotionQuery && reduceMotionQuery.matches);
      const viewBoxWidth = 1600;
      const viewBoxHeight = 740;
      const formatFloat = (value) => value.toFixed(2).replace(/\.00$/, "");
      const clamp = (value, min, max) => Math.min(max, Math.max(min, value));
      const lerp = (start, end, t) => start + (end - start) * t;
      const randomBetween = (min, max) => min + Math.random() * (max - min);
      const smoothApproach = (current, target, dt, speed) => {
        const alpha = 1 - Math.exp(-speed * dt);
        return current + (target - current) * alpha;
      };
      const easeInOutCubic = (t) => (
        t < 0.5
          ? 4 * t * t * t
          : 1 - Math.pow(-2 * t + 2, 3) / 2
      );
      const queryByIdSuffix = (root, suffix) => root.querySelector('[id$="' + suffix + '"]');

      const prefixStageIds = (stageEl, prefix) => {
        const idMap = new Map();
        stageEl.querySelectorAll("[id]").forEach((el) => {
          const oldId = el.id;
          const newId = prefix + "-" + oldId;
          idMap.set(oldId, newId);
          el.id = newId;
        });

        stageEl.querySelectorAll("*").forEach((el) => {
          Array.from(el.attributes).forEach((attr) => {
            const updatedValue = attr.value.replace(
              /url\(#([^)]+)\)|#([A-Za-z0-9_-]+)/g,
              (match, urlId, hashId) => {
                const refId = urlId || hashId;
                if (!idMap.has(refId)) {
                  return match;
                }
                return urlId ? "url(#" + idMap.get(refId) + ")" : "#" + idMap.get(refId);
              }
            );
            if (updatedValue !== attr.value) {
              el.setAttribute(attr.name, updatedValue);
            }
          });
        });
      };

      const clonePatrolStage = () => {
        const templateStage = battleEl.querySelector(".assault-wave .avx-stage");
        const patrolHost = battleEl.querySelector(".patrol-transport");
        if (!templateStage || !patrolHost) {
          return null;
        }

        const patrolStage = templateStage.cloneNode(true);
        prefixStageIds(patrolStage, "patrol");
        patrolStage.dataset.avxTemplate = "patrol";
        patrolStage.setAttribute("aria-hidden", "true");
        patrolHost.replaceChildren(patrolStage);
        return patrolStage;
      };

      const initAvxStage = (stageEl, options = {}) => {
        if (!stageEl) {
          return null;
        }

        const svgEl = stageEl.querySelector('svg[id$="transport-svg"]');
        const modelEl = queryByIdSuffix(stageEl, "transport-model");
        if (!svgEl || !modelEl) {
          return null;
        }

        const updateRenderScale = () => {
          const rect = svgEl.getBoundingClientRect();
          const rawScale = Math.min(
            rect.width / viewBoxWidth || 1,
            rect.height / viewBoxHeight || 1
          );
          const renderScale = Number.isFinite(rawScale) && rawScale > 0 ? rawScale : 1;
          const motionScale = Math.max(0.2, Math.min(1, renderScale));
          stageEl.style.setProperty("--avx-render-scale", renderScale.toFixed(4));
          stageEl.style.setProperty("--avx-motion-scale", motionScale.toFixed(4));
        };

        updateRenderScale();
        if (window.ResizeObserver) {
          const resizeObserver = new ResizeObserver(updateRenderScale);
          resizeObserver.observe(stageEl);
          resizeObserver.observe(svgEl);
        } else {
          window.addEventListener("resize", updateRenderScale, { passive: true });
        }

        if (prefersReducedMotion) {
          return { stageEl, svgEl, updateRenderScale };
        }

        const phaseOffset = options.phaseOffset || 0;
        const simulationOffset = options.simulationOffset || 0;
        const frontRigs = [
          {
            name: "left",
            shoulderEl: queryByIdSuffix(stageEl, "engine-left-shoulder"),
            elbowEl: queryByIdSuffix(stageEl, "engine-left-elbow"),
            shoulderPivot: [468, 424],
            elbowPivot: [430, 548],
            phase: 0.65 + phaseOffset,
            shoulderScale: 1,
            elbowScale: 1,
            microScale: 1,
            shoulderBias: 0,
            elbowBias: 0,
            state: { shoulder: 4.5, elbow: 1.5 },
            target: { shoulder: 4.5, elbow: 1.5 },
            nextAt: 0,
            lastPose: "hover-neutral"
          },
          {
            name: "right",
            shoulderEl: queryByIdSuffix(stageEl, "engine-right-shoulder"),
            elbowEl: queryByIdSuffix(stageEl, "engine-right-elbow"),
            shoulderPivot: [1052, 424],
            elbowPivot: [1014, 548],
            phase: 2.1 + phaseOffset,
            shoulderScale: 1,
            elbowScale: 1,
            microScale: 1,
            shoulderBias: 0,
            elbowBias: 0,
            state: { shoulder: 5.4, elbow: -1.2 },
            target: { shoulder: 5.4, elbow: -1.2 },
            nextAt: 0,
            lastPose: "hover-forward"
          }
        ].filter((rig) => rig.shoulderEl && rig.elbowEl);

        if (frontRigs.length !== 2) {
          return { stageEl, svgEl, updateRenderScale };
        }

        const rearRigs = [
          {
            name: "back-left",
            shoulderEl: queryByIdSuffix(stageEl, "engine-back-left-shoulder"),
            elbowEl: queryByIdSuffix(stageEl, "engine-back-left-elbow"),
            shoulderPivot: [468, 424],
            elbowPivot: [430, 548],
            phase: 1.15 + phaseOffset,
            shoulderScale: 0.72,
            elbowScale: 0.68,
            microScale: 0.72,
            shoulderBias: 1.6,
            elbowBias: 0.9,
            state: { shoulder: 4.2, elbow: 0.8 },
            target: { shoulder: 4.2, elbow: 0.8 },
            nextAt: 0,
            lastPose: "hover-neutral"
          },
          {
            name: "back-right",
            shoulderEl: queryByIdSuffix(stageEl, "engine-back-right-shoulder"),
            elbowEl: queryByIdSuffix(stageEl, "engine-back-right-elbow"),
            shoulderPivot: [1052, 424],
            elbowPivot: [1014, 548],
            phase: 2.65 + phaseOffset,
            shoulderScale: 0.7,
            elbowScale: 0.66,
            microScale: 0.68,
            shoulderBias: 1.2,
            elbowBias: 0.6,
            state: { shoulder: 4.8, elbow: -0.4 },
            target: { shoulder: 4.8, elbow: -0.4 },
            nextAt: 0,
            lastPose: "hover-forward"
          }
        ].filter((rig) => rig.shoulderEl && rig.elbowEl);

        const rigs = [...frontRigs, ...rearRigs];
        const tailRigEl = queryByIdSuffix(stageEl, "tail-rig");
        const tailSurfaceEl = queryByIdSuffix(stageEl, "tail-surface");
        const poseFamilies = [
          {
            id: "hover-forward",
            shoulder: [7.5, 12.8],
            elbow: [-6.2, -0.8],
            duration: [2100, 3900]
          },
          {
            id: "hover-vertical",
            shoulder: [-1.6, 3.2],
            elbow: [4.6, 10.8],
            duration: [2500, 4700]
          },
          {
            id: "hover-neutral",
            shoulder: [2.2, 6.4],
            elbow: [-2.4, 3.2],
            duration: [2200, 4200]
          },
          {
            id: "hover-brake",
            shoulder: [4.4, 8.2],
            elbow: [6.4, 11.6],
            duration: [2600, 5000]
          },
          {
            id: "hover-step",
            shoulder: [6.1, 10.4],
            elbow: [0.5, 5.8],
            duration: [1800, 3200]
          },
          {
            id: "hover-recover",
            shoulder: [0.8, 4.9],
            elbow: [-4.7, 1.6],
            duration: [2400, 4300]
          }
        ];

        const tailPoseFamilies = [
          {
            id: "tail-neutral",
            yaw: [-0.45, 0.65],
            trim: [-0.35, 0.45],
            x: [-0.35, 0.4],
            y: [-0.55, 0.3],
            duration: [2800, 5600]
          },
          {
            id: "tail-correct-left",
            yaw: [1.1, 2.4],
            trim: [-1.3, -0.15],
            x: [-1.1, -0.15],
            y: [-0.35, 0.55],
            duration: [3400, 6800]
          },
          {
            id: "tail-correct-right",
            yaw: [-2.2, -0.95],
            trim: [0.25, 1.35],
            x: [0.1, 1.0],
            y: [-0.4, 0.5],
            duration: [3200, 6400]
          },
          {
            id: "tail-stabilize",
            yaw: [-1.0, 1.15],
            trim: [-1.7, -0.5],
            x: [-0.45, 0.45],
            y: [-1.0, -0.15],
            duration: [2600, 5200]
          },
          {
            id: "tail-brake",
            yaw: [0.55, 1.7],
            trim: [0.85, 1.95],
            x: [-0.25, 0.35],
            y: [0.2, 0.95],
            duration: [3000, 5800]
          }
        ];

        const tailController = tailRigEl && tailSurfaceEl
          ? {
              rigEl: tailRigEl,
              surfaceEl: tailSurfaceEl,
              rigPivot: [1312, 468],
              surfacePivot: [1414, 468],
              lastPose: "tail-neutral",
              state: { yaw: 0.35, trim: 0.2, x: 0, y: 0 },
              target: { yaw: 0.35, trim: 0.2, x: 0, y: 0 },
              micro: { yaw: 0, trim: 0, x: 0, y: 0 },
              microTarget: { yaw: 0, trim: 0, x: 0, y: 0 },
              nextAt: 0,
              nextMicroAt: 0
            }
          : null;

        const pickPose = (lastPose) => {
          const candidates = poseFamilies.filter((pose) => pose.id !== lastPose || Math.random() < 0.2);
          return candidates[Math.floor(Math.random() * candidates.length)];
        };

        const pickTailPose = (lastPose) => {
          const candidates = tailPoseFamilies.filter((pose) => pose.id !== lastPose || Math.random() < 0.24);
          return candidates[Math.floor(Math.random() * candidates.length)];
        };

        const assignPose = (rig, pose, now, syncNudge = 0) => {
          rig.target.shoulder =
            randomBetween(pose.shoulder[0], pose.shoulder[1]) * rig.shoulderScale +
            rig.shoulderBias +
            syncNudge;
          rig.target.elbow =
            randomBetween(pose.elbow[0], pose.elbow[1]) * rig.elbowScale +
            rig.elbowBias -
            syncNudge * 0.9;
          rig.nextAt = now + randomBetween(pose.duration[0], pose.duration[1]);
          rig.lastPose = pose.id;
        };

        const assignTailPose = (tail, pose, now) => {
          tail.target.yaw = randomBetween(pose.yaw[0], pose.yaw[1]);
          tail.target.trim = randomBetween(pose.trim[0], pose.trim[1]);
          tail.target.x = randomBetween(pose.x[0], pose.x[1]);
          tail.target.y = randomBetween(pose.y[0], pose.y[1]);
          tail.nextAt = now + randomBetween(pose.duration[0], pose.duration[1]);
          tail.lastPose = pose.id;
        };

        const scheduleIndependentPose = (rig, now) => {
          assignPose(rig, pickPose(rig.lastPose), now, randomBetween(-0.25, 0.25));
        };

        const scheduleTailPose = (tail, now) => {
          assignTailPose(tail, pickTailPose(tail.lastPose), now);
        };

        const scheduleTailMicro = (tail, now) => {
          tail.microTarget.yaw = randomBetween(-0.24, 0.24);
          tail.microTarget.trim = randomBetween(-0.28, 0.28);
          tail.microTarget.x = randomBetween(-0.3, 0.3);
          tail.microTarget.y = randomBetween(-0.22, 0.22);
          tail.nextMicroAt = now + randomBetween(850, 2100);
        };

        const scheduleSharedPose = (now) => {
          const pose = pickPose("");
          assignPose(frontRigs[0], pose, now, randomBetween(-0.65, 0.25));
          assignPose(frontRigs[1], pose, now, randomBetween(-0.15, 0.75));
          rearRigs.forEach((rig, index) => {
            assignPose(
              rig,
              pose,
              now,
              randomBetween(index === 0 ? -0.35 : -0.1, index === 0 ? 0.18 : 0.42)
            );
          });
        };

        const setRotateTransform = (el, angle, pivot) => {
          el.setAttribute(
            "transform",
            "rotate(" + formatFloat(angle) + " " + pivot[0] + " " + pivot[1] + ")"
          );
        };

        const setTailRigTransform = (tail, x, y, yaw) => {
          tail.rigEl.setAttribute(
            "transform",
            "translate(" +
              formatFloat(x) +
              " " +
              formatFloat(y) +
              ") rotate(" +
              formatFloat(yaw) +
              " " +
              tail.rigPivot[0] +
              " " +
              tail.rigPivot[1] +
              ")"
          );
        };

        const setTailSurfaceTransform = (tail, trim) => {
          tail.surfaceEl.setAttribute(
            "transform",
            "rotate(" +
              formatFloat(trim) +
              " " +
              tail.surfacePivot[0] +
              " " +
              tail.surfacePivot[1] +
              ")"
          );
        };

        let lastFrame = performance.now() + simulationOffset;
        let nextScaleSampleAt = lastFrame + 180;
        let nextSharedEventAt = lastFrame + randomBetween(2800, 5400);

        frontRigs.forEach((rig, index) => {
          scheduleIndependentPose(rig, lastFrame - index * 900);
        });
        rearRigs.forEach((rig, index) => {
          scheduleIndependentPose(rig, lastFrame - 700 - index * 650);
        });
        if (tailController) {
          scheduleTailPose(tailController, lastFrame - 500);
          scheduleTailMicro(tailController, lastFrame);
        }

        const tick = (nowRaw) => {
          const now = nowRaw + simulationOffset;
          const dt = Math.min((now - lastFrame) / 1000, 0.05);
          lastFrame = now;

          if (now >= nextScaleSampleAt) {
            updateRenderScale();
            nextScaleSampleAt = now + 180;
          }

          if (now >= nextSharedEventAt) {
            if (Math.random() < 0.44) {
              scheduleSharedPose(now);
            }
            nextSharedEventAt = now + randomBetween(5200, 10400);
          }

          rigs.forEach((rig) => {
            if (now >= rig.nextAt) {
              scheduleIndependentPose(rig, now);
            }

            rig.state.shoulder = smoothApproach(rig.state.shoulder, rig.target.shoulder, dt, 1.6);
            rig.state.elbow = smoothApproach(rig.state.elbow, rig.target.elbow, dt, 2.25);

            const shoulderMicro =
              (Math.sin(now * 0.0011 + rig.phase) * 0.42 +
                Math.sin(now * 0.00037 + rig.phase * 1.9) * 0.18) *
              rig.microScale;
            const elbowMicro =
              (Math.sin(now * 0.00155 + rig.phase * 0.8) * 0.62 +
                Math.sin(now * 0.00051 + rig.phase * 1.4) * 0.22) *
              rig.microScale;

            setRotateTransform(rig.shoulderEl, rig.state.shoulder + shoulderMicro, rig.shoulderPivot);
            setRotateTransform(rig.elbowEl, rig.state.elbow + elbowMicro, rig.elbowPivot);
          });

          if (tailController) {
            if (now >= tailController.nextAt) {
              scheduleTailPose(tailController, now);
            }
            if (now >= tailController.nextMicroAt) {
              scheduleTailMicro(tailController, now);
            }

            tailController.state.yaw = smoothApproach(tailController.state.yaw, tailController.target.yaw, dt, 1.08);
            tailController.state.trim = smoothApproach(tailController.state.trim, tailController.target.trim, dt, 1.34);
            tailController.state.x = smoothApproach(tailController.state.x, tailController.target.x, dt, 1.2);
            tailController.state.y = smoothApproach(tailController.state.y, tailController.target.y, dt, 1.18);
            tailController.micro.yaw = smoothApproach(tailController.micro.yaw, tailController.microTarget.yaw, dt, 1.75);
            tailController.micro.trim = smoothApproach(tailController.micro.trim, tailController.microTarget.trim, dt, 1.82);
            tailController.micro.x = smoothApproach(tailController.micro.x, tailController.microTarget.x, dt, 1.66);
            tailController.micro.y = smoothApproach(tailController.micro.y, tailController.microTarget.y, dt, 1.66);

            setTailRigTransform(
              tailController,

      const createTechnicalCar = (index) => {

          g.appendChild(svgEl("rect", { x, y, width: w, height: h, rx: 4, fill: "url(#panelFill)", stroke: "#919dac", "stroke-width": 0.95 }));

      const createPassengerCar = (index) => {
        const width = METRICS.passengerWidth;

        appendAnimatedDoorBay(g, 448, 106, `coach-${index}-door-b`);
        appendPassengerWindows(g, 96, 108, 9, 36);
        g.appendChild(svgEl("path", { d: "M 92 150 H 443", stroke: "rgba(130,142,156,0.88)", "stroke-width": 1, fill: "none", "stroke-linecap": "round" }));
        g.appendChild(svgEl("path", { d: "M 19 240 L 522 240 Q 532 240 532 247 Q 529 255 518 257 L 22 257 Q 11 255 8 246 Q 8 241 19 240 Z", fill: "url(#underbodyFill)", stroke: "#8a96a4", "stroke-width": 1 }));
        [[28, 221, 62, 18], [102, 221, 84, 20], [198, 219, 72, 22], [280, 219, 82, 22], [375, 221, 58, 20], [447, 221, 58, 18]].forEach(([x, y, w, h]) => {
          g.appendChild(svgEl("rect", { x, y, width: w, height: h, rx: 4, fill: "url(#panelFill)", stroke: "#919cab", "stroke-width": 0.92 }));
        });
        g.appendChild(svgEl("rect", { x: 206, y: 163, width: 116, height: 10, rx: 4, fill: "url(#ventPattern)", stroke: "#919cab", "stroke-width": 0.8 }));

        addText(g, { x: 210, y: 211, fill: "#6a7685", "font-size": 10.2, "font-weight": 700, "letter-spacing": 1.55 }, `PASSENGER COACH ${String(index + 1).padStart(2, "0")}`);
        return { group: g, width };
      };

      const createModule = (type, index) => {
        if (type === "locomotive") {
          return createLocomotive(index);
        }
        if (type === "technical") {
          return createTechnicalCar(index);
        }
        return createPassengerCar(index);
      };

      const getModuleWidth = (type) => {
        if (type === "locomotive") {
          return METRICS.locomotiveWidth;
        }
        if (type === "technical") {
          return METRICS.technicalWidth;
        }
        return METRICS.passengerWidth;
      };

      const getJoinX = (index) => {
        let x = 0;
        for (let i = 0; i <= index; i++) {
          x += getModuleWidth(trainConfig[i].type);
          if (i < index) {
            x += METRICS.couplerGap;
          }
        }
        return x + 1;
      };

      const buildTrain = () => {
        svg.innerHTML = "";
        svg.appendChild(buildDefs());

        runtime.floatGroup = svgEl("g", { class: "railway-train-float" });
        runtime.motionGroup = svgEl("g");
        runtime.trainGroup = svgEl("g");

        svg.appendChild(runtime.floatGroup);
        runtime.floatGroup.appendChild(runtime.motionGroup);
        runtime.motionGroup.appendChild(runtime.trainGroup);

        let cursorX = 0;
        trainConfig.forEach((item, index) => {
          const module = createModule(item.type, index);
          module.group.setAttribute("transform", `translate(${cursorX} 0)`);
          runtime.trainGroup.appendChild(module.group);
          cursorX += module.width;
          if (index < trainConfig.length - 1) {
            const coupler = createCoupler(cursorX - 6);
            runtime.trainGroup.appendChild(coupler.group);
            cursorX += METRICS.couplerGap;
          }
        });

        trainConfig.slice(0, -1).forEach((_, i) => {
          const x = getJoinX(i);
          const bellows = svgEl("g", { transform: `translate(${x} 0)` });
          bellows.appendChild(svgEl("rect", { x: 0, y: 102, width: 11, height: 136, rx: 4, fill: "#5b6571", stroke: "#7a8592", "stroke-width": 1 }));
          for (let k = 0; k < 7; k++) {
            bellows.appendChild(svgEl("path", { d: `M 1.5 ${112 + k * 17} H 9.5`, stroke: "#8d98a5", "stroke-width": 1 }));
          }
          runtime.trainGroup.appendChild(bellows);
        });

        runtime.trainWidth = cursorX;
      };

      const getScaledWidth = () => runtime.trainWidth * MOTION.scale;
      const getStopLeft = () => MOTION.stopCenterX - getScaledWidth() * 0.5;

      const applyMotionTransform = () => {
        if (!runtime.motionGroup) {
          return;
        }
        const s = MOTION.scale;
        if (runtime.direction < 0) {
          runtime.motionGroup.setAttribute(
            "transform",
            `matrix(${s.toFixed(6)} 0 0 ${s.toFixed(6)} ${runtime.left.toFixed(3)} ${MOTION.trackY.toFixed(3)})`
          );
          return;
        }

        const e = runtime.left + getScaledWidth();
        runtime.motionGroup.setAttribute(
          "transform",
          `matrix(${(-s).toFixed(6)} 0 0 ${s.toFixed(6)} ${e.toFixed(3)} ${MOTION.trackY.toFixed(3)})`
        );
      };

      const resetPass = (nextDirection) => {
        runtime.direction = nextDirection;
        runtime.mode = "move";
        runtime.modeUntil = 0;
        runtime.stoppedOnThisPass = false;
        runtime.currentSpeed = MOTION.baseSpeed * 0.84;
        layerEl.classList.remove("is-door-open");

        const scaledWidth = getScaledWidth();
        if (runtime.direction < 0) {
          runtime.left = SCENE.width + MOTION.margin;
        } else {
          runtime.left = -scaledWidth - MOTION.margin;
        }
        applyMotionTransform();
      };

      const tick = (now) => {
        const dt = Math.min((now - runtime.lastFrame) / 1000, 0.05);
        runtime.lastFrame = now;

        if (runtime.mode === "move") {
          const stopLeft = getStopLeft();
          let targetSpeed = MOTION.baseSpeed;

          if (!runtime.stoppedOnThisPass) {
            const distToStop = runtime.direction < 0
              ? runtime.left - stopLeft
              : stopLeft - runtime.left;

            if (distToStop >= 0 && distToStop <= MOTION.decelRange) {
              const t = clamp(distToStop / MOTION.decelRange, 0, 1);
              targetSpeed = MOTION.minSpeed + (MOTION.baseSpeed - MOTION.minSpeed) * (0.16 + t * 0.84);
            }
          }

          runtime.currentSpeed += (targetSpeed - runtime.currentSpeed) * Math.min(1, dt * 3.1);
          runtime.left += runtime.direction * runtime.currentSpeed * dt;

          if (!runtime.stoppedOnThisPass) {
            const reachedStop = runtime.direction < 0
              ? runtime.left <= stopLeft
              : runtime.left >= stopLeft;

            if (reachedStop) {
              runtime.left = stopLeft;
              runtime.currentSpeed = 0;
              runtime.mode = "doors-open";
              runtime.modeUntil = now + MOTION.openMs;
              layerEl.classList.add("is-door-open");
            }
          }

          const scaledWidth = getScaledWidth();
          if (runtime.direction < 0 && runtime.left + scaledWidth < -MOTION.margin) {
            resetPass(1);
          } else if (runtime.direction > 0 && runtime.left > SCENE.width + MOTION.margin) {
            resetPass(-1);
          }
        } else if (runtime.mode === "doors-open") {
          if (now >= runtime.modeUntil) {
            runtime.mode = "doors-hold";
            runtime.modeUntil = now + MOTION.holdMs;
          }
        } else if (runtime.mode === "doors-hold") {
          if (now >= runtime.modeUntil) {
            runtime.mode = "doors-close";
            runtime.modeUntil = now + MOTION.closeMs;
            layerEl.classList.remove("is-door-open");
          }
        } else if (runtime.mode === "doors-close" && now >= runtime.modeUntil) {
          runtime.mode = "move";
          runtime.stoppedOnThisPass = true;
          runtime.currentSpeed = MOTION.minSpeed * 0.92;
        }

        applyMotionTransform();
        window.requestAnimationFrame(tick);
      };

      const setStaticStopUnderCentralTower = () => {
        runtime.direction = -1;
        runtime.mode = "doors-hold";
        runtime.modeUntil = Number.POSITIVE_INFINITY;
        runtime.stoppedOnThisPass = true;
        runtime.currentSpeed = 0;
        runtime.left = getStopLeft();
        layerEl.classList.add("is-static", "is-door-open");
        applyMotionTransform();
      };

      buildTrain();
      setStaticStopUnderCentralTower();
    })();
